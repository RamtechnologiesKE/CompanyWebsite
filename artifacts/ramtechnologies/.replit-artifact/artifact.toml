kind = "web"
previewPath = "/"
title = "Ramtechnologies"
version = "1.0.0"
id = "artifacts/ramtechnologies"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20698

[services.development]
run = "pnpm --filter @workspace/ramtechnologies run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ramtechnologies", "run", "build" ]
publicDir = "artifacts/ramtechnologies/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20698"
BASE_PATH = "/"
